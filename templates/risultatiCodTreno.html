{% extends "base.html" %}

{% block title %}{% endblock %}

{% block content %}
<div class="schedule-container">
<p>{{ codTreno }}</p>
    <div class="schedule-body">
        {% for fermata in schedule %}
        <div class="schedule-row">
        <div class="schedule-data">{{ fermata.nome_fermata }}</div>
        <div class="schedule-data">{{ fermata.orario_arrivo }}</div>
        <div class="schedule-data">{{ fermata.orario_partenza }}</div>
    </div>
    {% endfor %}
</div>
</div>
{% endblock %}
